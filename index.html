<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <link rel="icon" type="image/png" href="%BASE_URL%icons/icon-512.png" />

    <!-- Apply theme BEFORE first paint to prevent flash of wrong theme.
         Mirrors the logic in src/lib/theme.ts. Must stay in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('homeguru-theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || ((stored === 'system' || !stored) && systemDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage unavailable — default to light
        }
      })();
    </script>

    <!-- SPA routing restoration for GitHub Pages.
         Pairs with public/404.html — when a deep URL hits the 404 page, that page
         redirects here with the path encoded as ?/.../... and this script
         restores the original URL so React Router can pick it up. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <!-- PWA support (mobile-web-app-capable is the standardized name;
         apple-mobile-web-app-capable kept for older iOS versions) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yönetim" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-512.png" />

    <title>Yönetim</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
